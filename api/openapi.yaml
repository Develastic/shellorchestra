          maximum: 50000
          description: Scrollback history length used by every ShellOrchestra terminal window.
        terminal_cursor_style:
          type: string
          enum: [underline, bar]
          description: Cursor style used by every ShellOrchestra terminal window.
        terminal_keymap_layout:
          type: string
          enum: [en, ru]
          description: Terminal keyboard helper layout. EN converts accidental Cyrillic layout back to command-friendly Latin; RU maps Latin keys to Cyrillic characters.
