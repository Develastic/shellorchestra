          type: boolean
          description: When true, ShellOrchestra asks mobile browsers not to open the touch keyboard automatically for terminal focus.
        terminal_tmux_prefix_guard:
          type: boolean
          description: When true, ShellOrchestra intercepts the reserved tmux prefix key before it reaches the managed terminal.
