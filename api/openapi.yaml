openapi: 3.1.0
info:
  title: ShellOrchestra API
  version: 0.1.0
servers:
  - url: /api
security:
  - cookieAuth: []
paths:
  /healthz:
    get:
      security: []
      operationId: getHealth
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /bootstrap/state:
    get:
      security: []
      operationId: getBootstrapState
      responses:
        '200':
          description: Bootstrap state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapState'
  /auth/me:
    get:
      operationId: getCurrentPrincipal
      responses:
        '200':
          description: Current authenticated principal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Principal'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/logout:
    post:
      operationId: logout
      responses:
        '204':
          description: Logged out
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/device-signing-key:
    post:
      operationId: registerDeviceSigningKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceSigningKeyRequest'
      responses:
        '200':
          description: Device request signing key registered for the current authenticated session.
          content:
            application/json:
              schema:
                type: object
                required: [device_id, registered]
                properties:
                  device_id:
                    type: string
                  registered:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/device-envelope-key:
    post:
      operationId: registerDeviceEnvelopeKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceEnvelopeKeyRequest'
      responses:
        '200':
          description: Device key-delivery public key registered for the current authenticated session.
          content:
            application/json:
              schema:
                type: object
                required: [device_id, registered, envelope_public_key_spki_b64, key_share_refreshed, key_share_refresh_message]
                properties:
                  device_id:
                    type: string
                  registered:
                    type: boolean
                  envelope_public_key_spki_b64:
                    type: string
                  key_share_refreshed:
                    type: boolean
                    description: Whether the currently unlocked CA signer refreshed this device's encrypted server-access key share for the submitted envelope key.
                  key_share_refresh_message:
                    type: string
                    description: Human-readable diagnostic for the key-share refresh attempt.
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/debug/login:
    post:
      security: []
      operationId: debugLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DebugLoginRequest'
      responses:
        '200':
          description: Debug session created for an allowed client IP.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyLoginFinishResponse'
  /debug/client-events:
    post:
      operationId: postDebugClientEvents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DebugClientEventsRequest'
      responses:
        '202':
          description: Debug client events accepted.
          content:
            application/json:
              schema:
                type: object
                required: [stored]
                properties:
                  stored:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Debug support is not available or not enabled.
  /debug/runtime-unlock:
    post:
      operationId: debugRuntimeUnlock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DebugLoginRequest'
      responses:
        '200':
          description: Debug-only server-access unlock completed using the protected debug key-share vault.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeLockState'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Debug support is not available or not enabled.
        '409':
          description: Debug server-access key share is not available yet.
  /auth/passkey/register/begin:
    post:
      security: []
      operationId: beginPasskeyRegistration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyRegistrationBeginRequest'
      responses:
        '200':
          description: Passkey registration options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyBeginResponse'
  /auth/passkey/register/finish:
    post:
      security: []
      operationId: finishPasskeyRegistration
      parameters:
        - $ref: '#/components/parameters/CeremonyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Registered and authenticated device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyRegistrationFinishResponse'
  /auth/passkey/login/begin:
    post:
      security: []
      operationId: beginPasskeyLogin
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyLoginBeginRequest'
      responses:
        '200':
          description: Passkey login options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyBeginResponse'
  /auth/passkey/login/finish:
    post:
      security: []
      operationId: finishPasskeyLogin
      parameters:
        - $ref: '#/components/parameters/CeremonyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Authenticated device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyLoginFinishResponse'
  /auth/device-requests/register/begin:
    post:
      security: []
      operationId: beginDeviceAuthorizationRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceRequestBeginRequest'
      responses:
        '200':
          description: New-device passkey registration options
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyBeginResponse'
  /auth/device-requests/register/finish:
    post:
      security: []
      operationId: finishDeviceAuthorizationRequest
      parameters:
        - $ref: '#/components/parameters/CeremonyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: New-device authorization request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceRequestCreated'
  /auth/device-requests/{requestId}/status:
    post:
      security: []
      operationId: getDeviceAuthorizationRequestStatus
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceRequestStatusRequest'
      responses:
        '200':
          description: New-device authorization request status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceRequestStatus'
  /device-requests:
    get:
      operationId: listDeviceAuthorizationRequests
      responses:
        '200':
          description: Pending device authorization requests
          content:
            application/json:
              schema:
                type: object
                required: [requests]
                properties:
                  requests:
                    type: array
                    items:
                      $ref: '#/components/schemas/DeviceAuthorizationRequest'
  /device-requests/{requestId}/approve:
    post:
      operationId: approveDeviceAuthorizationRequest
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceRequestApproveRequest'
      responses:
        '200':
          description: Device authorization request approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceAuthorizationRequest'
  /device-requests/{requestId}/deny:
    post:
      operationId: denyDeviceAuthorizationRequest
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Device authorization request denied
  /auth/lan/setup/begin:
    post:
      security: []
      operationId: beginLanOnlySetup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LANSetupBeginRequest'
      responses:
        '200':
          description: LAN-only authenticator setup details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LANSetupBeginResponse'
  /auth/lan/setup/finish:
    post:
      security: []
      operationId: finishLanOnlySetup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LANSetupFinishRequest'
      responses:
        '200':
          description: LAN-only setup completed and authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LANAuthResponse'
  /auth/lan/login:
    post:
      security: []
      operationId: loginLanOnly
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LANLoginRequest'
      responses:
        '200':
          description: LAN-only admin authenticated and runtime unlocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LANAuthResponse'
  /devices:
    get:
      operationId: listClientDevices
      responses:
        '200':
          description: Authorized client devices and their server-access key readiness.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientDevicesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /devices/{device_id}/revoke:
    post:
      operationId: revokeClientDevice
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Device authorization revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevokeClientDeviceResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Device not found
        '409':
          description: Device cannot be revoked from this screen
  /runtime/lock-state:
    get:
      operationId: getRuntimeLockState
      responses:
        '200':
          description: Runtime lock state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeLockState'
  /runtime/lock:
    post:
      operationId: lockRuntime
      responses:
        '200':
          description: Runtime locked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeLockState'
  /runtime/unlock:
    post:
      operationId: unlockRuntime
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnlockRequest'
      responses:
        '200':
          description: Runtime unlocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeLockState'
  /keys/status:
    get:
      operationId: getKeysStatus
      responses:
        '200':
          description: Server access key authority status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeysStatus'
  /keys/create:
    post:
      operationId: createKeys
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KeysCreateRequest'
      responses:
        '200':
          description: Server access key authority created or rotated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeysCreateResponse'
  /keys/change-approvals:
    post:
      operationId: beginKeyChangeApproval
      responses:
        '200':
          description: Phone approval request for a server-access key change
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeyChangeApprovalBegin'
  /keys/change-approvals/{request_id}/status:
    post:
      operationId: getKeyChangeApprovalStatus
      parameters:
        - name: request_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KeyChangeApprovalStatusRequest'
      responses:
        '200':
          description: Current phone approval state for a server-access key change
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeyChangeApprovalStatus'
  /keys/change-approvals/{request_id}/approve:
    post:
      operationId: approveKeyChange
      parameters:
        - name: request_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Phone approval accepted for a server-access key change
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeyChangeApprovalStatus'
  /keys/device-share:
    get:
      operationId: getCurrentDeviceKeyShare
      responses:
        '200':
          description: Encrypted key share for the current device and active authority epoch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentDeviceKeyShare'
  /keys/device-shares:
    post:
      operationId: storeDeviceKeyShares
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceKeySharesRequest'
      responses:
        '200':
          description: Encrypted device key shares stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceKeySharesResponse'
  /keys/current-device-share:
    post:
      operationId: storeCurrentDeviceKeyShare
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CurrentDeviceShareRequest'
      responses:
        '200':
          description: Encrypted current server-access key share stored for the authenticated device.
          content:
            application/json:
              schema:
                type: object
                required: [stored, active_epoch, device_id]
                properties:
                  stored:
                    type: boolean
                  active_epoch:
                    type: integer
                  device_id:
                    type: string
  /system/version-check:
    get:
      operationId: getSystemVersionCheck
      responses:
        '200':
          description: Signed release update check result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemVersionCheck'
  /system/upgrade:
    post:
      operationId: startSystemUpgrade
      responses:
        '202':
          description: Local updater accepted the upgrade request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemUpgradeStartResponse'
        '409':
          description: One-click upgrade is unavailable or no update is pending
  /system/upgrade/jobs/{job_id}:
    get:
      operationId: getSystemUpgradeJob
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Local updater job status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemUpgradeJob'
        '404':
          description: Updater job was not found
  /settings/ui:
    get:
      operationId: getUISettings
      responses:
        '200':
          description: UI settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UISettings'
    put:
      operationId: updateUISettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UISettingsInput'
      responses:
        '200':
          description: Updated UI settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UISettings'
  /settings/security/ssh:
    get:
      operationId: getSSHSecuritySettings
      responses:
        '200':
          description: SSH security settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSHSecuritySettings'
    put:
      operationId: updateSSHSecuritySettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SSHSecuritySettingsInput'
      responses:
        '200':
          description: Updated SSH security settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSHSecuritySettings'
  /settings/wallpaper/custom:
    get:
      operationId: getCustomWallpaper
      responses:
        '200':
          description: Custom wallpaper image
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
    post:
      operationId: uploadCustomWallpaper
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [wallpaper]
              properties:
                wallpaper:
                  type: string
                  format: binary
      responses:
        '200':
          description: Updated UI settings after wallpaper upload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UISettings'
  /server-tools/backend:
    get:
      operationId: getBackendToolsStatus
      responses:
        '200':
          description: ShellOrchestra internal service telemetry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackendToolsStatus'
  /server-tools/backend/restart:
    post:
      operationId: restartBackendServices
      responses:
        '409':
          description: Backend restart requires a separate supervisor service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /servers:
    get:
      operationId: listServers
      responses:
        '200':
          description: Servers
          content:
            application/json:
              schema:
                type: object
                required: [servers]
                properties:
                  servers:
                    type: array
                    items:
                      $ref: '#/components/schemas/Server'
    post:
      operationId: createServer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServerInput'
      responses:
        '201':
          description: Created server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Server'
  /servers/import-ssh-config/scan:
    post:
      operationId: scanSSHConfigSources
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SSHConfigSourceScanRequest'
      responses:
        '200':
          description: Detected local SSH profile sources and import candidates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSHConfigSourceScanResult'
  /servers/import-ssh-config:
    post:
      operationId: importSSHConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SSHConfigImportRequest'
      responses:
        '200':
          description: SSH config import result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSHConfigImportResult'
  /servers/test-tcp:
    post:
      operationId: testServerTCP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServerWizardRequest'
      responses:
        '200':
          description: TCP reachability test result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerTCPTestResult'
  /servers/test-auth:
    post:
      operationId: testServerAuth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServerWizardRequest'
      responses:
        '200':
          description: SSH authentication test result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerAuthTestResult'
  /servers/detect-facts:
    post:
      operationId: detectServerFacts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServerWizardRequest'
      responses:
        '200':
          description: Server facts detected over SSH
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerFacts'
  /servers/actions/packages-upgrade:
    post:
      operationId: runPackageUpgradeOnServers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServerBatchActionRequest'
      responses:
        '202':
          description: Package upgrade runs accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerBatchActionResponse'
  /servers/actions/reboot:
    post:
      operationId: runRebootOnServers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServerBatchActionRequest'
      responses:
        '202':
          description: Reboot runs accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerBatchActionResponse'
  /desktops/{serverId}:
    get:
      operationId: getVirtualDesktop
      parameters:
        - $ref: '#/components/parameters/ServerId'
      responses:
        '200':
          description: Virtual desktop state for a server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualDesktopState'
    put:
      operationId: saveVirtualDesktop
      parameters:
        - $ref: '#/components/parameters/ServerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VirtualDesktopSaveRequest'
      responses:
        '200':
          description: Saved virtual desktop state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualDesktopState'
        '409':
          description: Virtual desktop was changed by another trusted device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualDesktopSaveConflict'
  /desktop-wallpapers:
    get:
      operationId: listVirtualDesktopWallpapers
      responses:
        '200':
          description: Custom virtual desktop wallpaper library
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualDesktopWallpaperList'
    post:
      operationId: uploadVirtualDesktopWallpaper
      parameters:
        - name: label
          in: query
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          image/png:
            schema:
              type: string
              format: binary
          image/jpeg:
            schema:
              type: string
              format: binary
          image/webp:
            schema:
              type: string
              format: binary
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: Uploaded custom virtual desktop wallpaper
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VirtualDesktopWallpaper'
  /desktop-wallpapers/{wallpaperId}:
    get:
      operationId: getVirtualDesktopWallpaperImage
      parameters:
        - $ref: '#/components/parameters/WallpaperId'
      responses:
        '200':
          description: Custom virtual desktop wallpaper image
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
    delete:
      operationId: deleteVirtualDesktopWallpaper
      parameters:
        - $ref: '#/components/parameters/WallpaperId'
      responses:
        '204':
          description: Custom virtual desktop wallpaper deleted
  /desktop-apps:
    get:
      operationId: listDesktopApps
      parameters:
        - name: server_id
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Virtual desktop application profiles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DesktopAppListResponse'
  /desktop-apps/{appId}/launch:
    post:
      operationId: launchDesktopApp
      parameters:
        - $ref: '#/components/parameters/AppId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DesktopAppLaunchRequest'
      responses:
        '200':
          description: Desktop app launched as a terminal window
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DesktopAppLaunchResponse'
  /desktop-apps/{appId}/install:
    post:
      operationId: installDesktopApp
      parameters:
        - $ref: '#/components/parameters/AppId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DesktopAppInstallRequest'
      responses:
        '202':
          description: Desktop app install script accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DesktopAppInstallResponse'
  /desktop-apps/{appId}/action:
    post:
      operationId: runDesktopAppAction
      parameters:
        - $ref: '#/components/parameters/AppId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DesktopAppActionRequest'
      responses:
        '202':
          description: Desktop app action script accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DesktopAppActionResponse'
  /desktop-apps/{appId}/data:
    post:
      operationId: runDesktopAppData
      parameters:
        - $ref: '#/components/parameters/AppId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DesktopAppDataRequest'
      responses:
        '200':
          description: Desktop app data returned from an external script profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DesktopAppDataResponse'
  /desktop-apps/{appId}/data-stream:
    post:
      operationId: streamDesktopAppData
      parameters:
        - $ref: '#/components/parameters/AppId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DesktopAppDataRequest'
      responses:
        '200':
          description: Desktop app read-only data streamed as NDJSON events from the shared remote stream framework
          content:
            application/x-ndjson:
              schema:
                type: string
                description: Newline-delimited JSON events. A result event contains DesktopAppDataResponse-shaped data.
  /file-versions:
    get:
      operationId: listFileVersions
      parameters:
        - name: server_id
          in: query
          required: true
          schema:
            type: string
        - name: path
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: File version history for one remote file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileVersionListResponse'
  /file-versions/{versionId}:
    get:
      operationId: getFileVersion
      parameters:
        - name: versionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: One stored file version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileVersionContent'
  /audit/head:
    get:
      operationId: getAuditHead
      responses:
        '200':
          description: Current tamper-evident audit chain head
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditHead'
  /audit/verify:
    get:
      operationId: verifyAuditChain
      responses:
        '200':
          description: Audit chain verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditVerifyResult'
  /terminals:
    post:
      operationId: createTerminalSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TerminalCreateRequest'
      responses:
        '200':
          description: Created terminal session snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalSnapshot'
  /terminals/{sessionId}/snapshot:
    get:
      operationId: getTerminalSnapshot
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Terminal pane snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalSnapshot'
  /terminals/{sessionId}/stream-ticket:
    post:
      operationId: createTerminalStreamTicket
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Short-lived terminal stream ticket issued
          content:
            application/json:
              schema:
                type: object
                required: [token, expires_at]
                properties:
                  token:
                    type: string
                  expires_at:
                    type: string
                    format: date-time
  /terminals/{sessionId}/input:
    post:
      operationId: sendTerminalInput
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TerminalInputRequest'
      responses:
        '204':
          description: Input accepted
  /terminals/{sessionId}/resize:
    post:
      operationId: resizeTerminal
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TerminalResizeRequest'
      responses:
        '200':
          description: Resized terminal snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminalSnapshot'
  /terminals/{sessionId}/close:
    post:
      operationId: closeTerminal
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '204':
          description: Terminal closed
  /ssh-user-keys:
    get:
      operationId: listSSHUserKeys
      responses:
        '200':
          description: Imported user SSH keys
          content:
            application/json:
              schema:
                type: object
                required: [keys]
                properties:
                  keys:
                    type: array
                    items:
                      $ref: '#/components/schemas/SSHUserKey'
    post:
      operationId: createSSHUserKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SSHUserKeyCreateRequest'
      responses:
        '201':
          description: Imported SSH key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSHUserKey'
  /servers/{serverId}:
    put:
      operationId: updateServer
      parameters:
        - $ref: '#/components/parameters/ServerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServerInput'
      responses:
        '200':
          description: Updated server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Server'
    delete:
      operationId: deleteServer
      parameters:
        - $ref: '#/components/parameters/ServerId'
      responses:
        '204':
          description: Deleted server
  /servers/{serverId}/bootstrap-command:
    post:
      operationId: buildServerBootstrapCommand
      parameters:
        - $ref: '#/components/parameters/ServerId'
      responses:
        '200':
          description: Bootstrap command
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapCommand'
  /servers/{serverId}/host-keys/scan:
    post:
      operationId: scanServerHostKeys
      parameters:
        - $ref: '#/components/parameters/ServerId'
      responses:
        '200':
          description: Current SSH server host keys
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HostKeyScanResult'
  /servers/{serverId}/host-keys/accept:
    post:
      operationId: acceptServerHostKeys
      parameters:
        - $ref: '#/components/parameters/ServerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HostKeyAcceptRequest'
      responses:
        '200':
          description: Server with replaced trusted host keys
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Server'
  /status:
    get:
      operationId: listServerStatuses
      responses:
        '200':
          description: Server statuses
          content:
            application/json:
              schema:
                type: object
                required: [statuses]
                properties:
                  statuses:
                    type: array
                    items:
                      $ref: '#/components/schemas/ServerStatus'
  /scripts:
    get:
      operationId: listScripts
      responses:
        '200':
          description: Script catalog
          content:
            application/json:
              schema:
                type: object
                required: [commands, system_scripts]
                properties:
                  commands:
                    type: array
                    items:
                      $ref: '#/components/schemas/ScriptCommand'
                  system_scripts:
                    type: array
                    items:
                      $ref: '#/components/schemas/SystemScriptSource'
  /scripts/{command}/run:
    post:
      operationId: runScript
      parameters:
        - name: command
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunScriptRequest'
      responses:
        '202':
          description: Script run accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScriptRun'
  /script-runs/{runId}:
    get:
      operationId: getScriptRun
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Script run status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScriptRun'
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: shellorchestra_access
  parameters:
    ServerId:
      name: serverId
      in: path
      required: true
      schema:
        type: string
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
    AppId:
      name: appId
      in: path
      required: true
      schema:
        type: string
    WallpaperId:
      name: wallpaperId
      in: path
      required: true
      schema:
        type: string
    RunId:
      name: runId
      in: path
      required: true
      schema:
        type: string
    CeremonyId:
      name: ceremony_id
      in: query
      required: true
      schema:
        type: string
  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Request is not allowed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    HealthResponse:
      type: object
      required: [ok, service]
      properties:
        ok:
          type: boolean
        service:
          type: string
    BootstrapState:
      type: object
      required: [state, app_version, app_edition, runtime_session_id, timeout_minutes, debug_supported, debug_enabled, windows_desktop_server, local_protected_key_available]
      properties:
        state:
          type: string
          enum: [open, expired, complete]
        app_version:
          type: string
        app_edition:
          type: string
          enum: [community, pro, business, enterprise]
        runtime_session_id:
          type: string
        auth_mode:
          type: string
          enum: [unset, passkey, lan_totp]
        passkey_origin:
          type: string
          nullable: true
        current_origin:
          type: string
        timeout_minutes:
          type: integer
        qr_url:
          type: string
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        debug_supported:
          type: boolean
        debug_enabled:
          type: boolean
        windows_desktop_server:
          type: boolean
        local_protected_key_available:
          type: boolean
        debug_feedback:
          type: object
          properties:
            submit_url:
              type: string
              nullable: true
            project:
              type: string
              nullable: true
            local_storage_enabled:
              type: boolean
    Principal:
      type: object
      required: [device_id, label, kind, can_approve_device_requests, session_idle_timeout_seconds]
      properties:
        device_id:
          type: string
        label:
          type: string
        kind:
          type: string
          enum: [phone, desktop, browser]
        can_approve_device_requests:
          type: boolean
          description: True only for the first approved phone that may review and approve new-device requests.
        session_idle_timeout_seconds:
          type: integer
          description: Current browser inactivity timeout in seconds.
    DebugLoginRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: Debug login token. Send in JSON body; never place this token in query parameters.
    DebugClientEventsRequest:
      type: object
      required: [source, events]
      properties:
        source:
          type: string
        events:
          type: array
          maxItems: 50
          items:
            type: object
            required: [at, step, message]
            properties:
              at:
                type: string
              step:
                type: string
              message:
                type: string
              details:
                type: object
                additionalProperties: true
    DeviceSigningKeyRequest:
      type: object
      required: [public_key_spki_b64]
      properties:
        public_key_spki_b64:
          type: string
          description: Base64 DER SPKI public key for passive browser-side request signatures.
    DeviceEnvelopeKeyRequest:
      type: object
      required: [envelope_public_key_spki_b64]
      properties:
        envelope_public_key_spki_b64:
          type: string
          description: Base64 DER SPKI RSA-OAEP public key used to deliver encrypted server-access key shares to this browser.
    PasskeyRegistrationBeginRequest:
      type: object
      required: [label, kind]
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 120
        kind:
          type: string
          enum: [phone, desktop, browser]
        bootstrap_token:
          type: string
          nullable: true
          description: One-time first-start QR token required before any approved device exists.
        envelope_public_key_spki_b64:
          type: string
          nullable: true
          description: Device key-delivery public key used later to deliver encrypted server-access key shares.
    PasskeyLoginBeginRequest:
      type: object
      properties:
        device_id:
          type: string
          nullable: true
          description: Local trusted device id remembered by this browser. Used to keep allowCredentials scoped to this device.
        credential_id:
          type: string
          nullable: true
          description: Local trusted passkey credential id remembered by this browser.
    PasskeyBeginResponse:
      type: object
      required: [ceremony_id, options, expires_at]
      properties:
        ceremony_id:
          type: string
        options:
          type: object
          additionalProperties: true
        expires_at:
          type: string
          format: date-time
    PasskeyRegistrationFinishResponse:
      type: object
      required: [principal]
      properties:
        principal:
          $ref: '#/components/schemas/Principal'
        credential_id:
          type: string
          nullable: true
        device_share_b64:
          type: string
          nullable: true
        public_key:
          type: string
          nullable: true
    PasskeyLoginFinishResponse:
      type: object
      required: [principal]
      properties:
        principal:
          $ref: '#/components/schemas/Principal'
        credential_id:
          type: string
          nullable: true
    DeviceRequestBeginRequest:
      type: object
      required: [label, kind, envelope_public_key_spki_b64]
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 120
        kind:
          type: string
          enum: [phone, desktop, browser]
        envelope_public_key_spki_b64:
          type: string
          description: New-device encryption public key used by an approved device to encrypt the approval share.
    DeviceRequestCreated:
      type: object
      required: [request_id, poll_token, verification_code, state, expires_at]
      properties:
        request_id:
          type: string
        poll_token:
          type: string
        verification_code:
          type: string
        state:
          type: string
          enum: [pending]
        expires_at:
          type: string
          format: date-time
    DeviceRequestStatusRequest:
      type: object
      required: [poll_token]
      properties:
        poll_token:
          type: string
          description: Polling secret returned to the requesting browser. Sent in the request body so it is not exposed in the browser URL.
    DeviceRequestStatus:
      type: object
      required: [request_id, state, verification_code, expires_at]
      properties:
        request_id:
          type: string
        state:
          type: string
          enum: [pending, approved, denied]
        verification_code:
          type: string
        encrypted_device_share_b64:
          type: string
          nullable: true
        device_id:
          type: string
          nullable: true
        label:
          type: string
          nullable: true
        kind:
          type: string
          enum: [phone, desktop, browser]
          nullable: true
        credential_id:
          type: string
          nullable: true
        expires_at:
          type: string
          format: date-time
    DeviceAuthorizationRequest:
      type: object
      required: [id, label, kind, verification_code, envelope_public_key_spki_b64, state, created_at, expires_at]
      properties:
        id:
          type: string
        label:
          type: string
        kind:
          type: string
          enum: [phone, desktop, browser]
        verification_code:
          type: string
        envelope_public_key_spki_b64:
          type: string
        state:
          type: string
          enum: [pending, approved, denied]
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
    DeviceRequestApproveRequest:
      type: object
      required: [encrypted_device_share_b64]
      properties:
        encrypted_device_share_b64:
          type: string
    LANSetupBeginRequest:
      type: object
      required: [bootstrap_token]
      properties:
        bootstrap_token:
          type: string
    LANSetupBeginResponse:
      type: object
      required: [secret, otpauth_url, expires_at]
      properties:
        secret:
          type: string
        otpauth_url:
          type: string
        expires_at:
          type: string
          format: date-time
    LANSetupFinishRequest:
      type: object
      required: [bootstrap_token, passphrase, totp_code]
      properties:
        bootstrap_token:
          type: string
        passphrase:
          type: string
          minLength: 12
        totp_code:
          type: string
          minLength: 6
          maxLength: 12
    LANLoginRequest:
      type: object
      required: [passphrase, totp_code]
      properties:
        passphrase:
          type: string
        totp_code:
          type: string
          minLength: 6
          maxLength: 12
    LANAuthResponse:
      type: object
      required: [principal, lock_state]
      properties:
        principal:
          $ref: '#/components/schemas/Principal'
        lock_state:
          $ref: '#/components/schemas/RuntimeLockState'
        public_key:
          type: string
          nullable: true
    ClientDevicesResponse:
      type: object
      required: [devices, current_device_id, key_authority_initialized, active_epoch, auth_mode]
      properties:
        devices:
          type: array
          items:
            $ref: '#/components/schemas/ClientDevice'
        current_device_id:
          type: string
        key_authority_initialized:
          type: boolean
        active_epoch:
          type: integer
        auth_mode:
          type: string
          enum: [unset, passkey, lan_totp]
    ClientDevice:
      type: object
      required: [device_id, label, kind, current_device, can_approve_new_devices, can_revoke, active_session_count, passkey_ready, request_protection_ready, key_distribution]
      properties:
        device_id:
          type: string
        label:
          type: string
        kind:
          type: string
          enum: [phone, desktop, browser]
        current_device:
          type: boolean
        can_approve_new_devices:
          type: boolean
        can_revoke:
          type: boolean
        revoke_blocker:
          type: string
          nullable: true
        approved_at:
          type: string
          format: date-time
          nullable: true
        last_login_at:
          type: string
          format: date-time
          nullable: true
        last_login_ip:
          type: string
          nullable: true
        active_session_count:
          type: integer
        passkey_ready:
          type: boolean
        request_protection_ready:
          type: boolean
        key_distribution:
          $ref: '#/components/schemas/ClientDeviceKeyDistribution'
    RevokeClientDeviceResponse:
      type: object
      required: [device_id, revoked, message]
      properties:
        device_id:
          type: string
        revoked:
          type: boolean
        message:
          type: string
    ClientDeviceKeyDistribution:
      type: object
      required: [status, label, detail, device_epoch, active_epoch]
      properties:
        status:
          type: string
          enum: [current, add_again, outdated, missing, not_configured, not_required]
        label:
          type: string
        detail:
          type: string
        device_epoch:
          type: integer
        active_epoch:
          type: integer
        updated_at:
          type: string
          format: date-time
          nullable: true
    RuntimeLockState:
      type: object
      required: [locked, initialized, message]
      properties:
        locked:
          type: boolean
        initialized:
          type: boolean
        message:
          type: string
    UnlockRequest:
      type: object
      required: [device_share_b64]
      properties:
        device_share_b64:
          type: string
    KeyDevice:
      type: object
      required: [device_id, label, kind, signer_epoch, envelope_key_available]
      properties:
        device_id:
          type: string
        label:
          type: string
        kind:
          type: string
          enum: [phone, desktop, browser]
        signer_epoch:
          type: integer
        envelope_key_available:
          type: boolean
        envelope_public_key_spki_b64:
          type: string
          nullable: true
    InstallCommandTarget:
      type: object
      required: [id, label, platform, remote_shell, local_command]
      properties:
        id:
          type: string
        label:
          type: string
        platform:
          type: string
        remote_shell:
          type: string
          enum: [posix, powershell]
        local_command:
          type: string
        authorized_key_line:
          type: string
          description: Present for classic fallback authorized_keys installation targets.
    InstallerMetadata:
      type: object
      required: [script_url, expected_sha256_url, source_url]
      properties:
        script_url:
          type: string
          description: Short HTTPS endpoint that serves the ShellOrchestra default POSIX SSH key setup helper script. PowerShell helper URLs are derived from the same origin.
        expected_sha256_url:
          type: string
          description: HTTPS endpoint that serves the expected SHA-256 hash for the default POSIX key setup helper script.
        source_url:
          type: string
          description: Versioned HTTPS source URL for the default POSIX key setup helper script.
    KeysStatus:
      type: object
      required: [initialized, auth_mode, active_epoch, cert_ttl_minutes, installer, install_targets, classic_install_targets, current_device_id, current_device_kind, desktop_setup_allowed, windows_desktop_server, local_protected_key_available, devices]
      properties:
        initialized:
          type: boolean
        auth_mode:
          type: string
          enum: [unset, passkey, lan_totp]
        label:
          type: string
          nullable: true
        public_key:
          type: string
          nullable: true
        classic_public_key:
          type: string
          nullable: true
        active_epoch:
          type: integer
        cert_ttl_minutes:
          type: integer
        installer:
          $ref: '#/components/schemas/InstallerMetadata'
        install_command:
          type: string
          nullable: true
        install_targets:
          type: array
          items:
            $ref: '#/components/schemas/InstallCommandTarget'
        classic_install_targets:
          type: array
          items:
            $ref: '#/components/schemas/InstallCommandTarget'
        current_device_id:
          type: string
        current_device_kind:
          type: string
          enum: [phone, desktop, browser]
        desktop_setup_allowed:
          type: boolean
        windows_desktop_server:
          type: boolean
        local_protected_key_available:
          type: boolean
        devices:
          type: array
          items:
            $ref: '#/components/schemas/KeyDevice'
    KeysCreateRequest:
      type: object
      properties:
        label:
          type: string
          description: Human-readable label for this SSH CA key.
        public_key:
          type: string
          description: Required when importing an existing private key. Must match the private key.
        private_key:
          type: string
          description: Optional unencrypted OpenSSH Ed25519 private key to import as the ShellOrchestra CA.
        passphrase:
          type: string
          description: LAN-only admin passphrase used to encrypt imported or generated key material.
        rotate_confirmed:
          type: boolean
        approval_id:
          type: string
          description: Server-access key-change approval request ID from the primary approval phone workflow.
