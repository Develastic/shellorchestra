        desktop_toolbar_padding_x_px:
          type: integer
          minimum: 0
          maximum: 24
          description: Global horizontal padding inside virtual-desktop app toolbars.
        desktop_toolbar_padding_y_px:
          type: integer
          minimum: 0
          maximum: 16
          description: Global vertical padding inside virtual-desktop app toolbars.
        desktop_toast_visible_ms:
          type: integer
          minimum: 1000
          maximum: 30000
          description: Time that virtual-desktop toasts stay fully visible before dissolving. Default is 4000 ms.
