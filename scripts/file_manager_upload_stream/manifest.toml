name = "file_manager_upload_stream"
description = "Stream a browser-uploaded file to a remote path without JSON/base64 payloads."
output_schema = "json"
app_ids = ["file_manager"]
app_role = "data"
timeout_seconds = 1800
stream_policy = "binary_upload"
max_stdout_bytes = 8388608
max_stderr_bytes = 1048576
max_decoded_bytes = 33554432

[[variants]]
id = "windows-powershell"
file = "powershell.ps1"
shell = "powershell"
os = ["windows"]

[[variants]]
id = "posix"
file = "posix.sh"
shell = "posix"
default = true
