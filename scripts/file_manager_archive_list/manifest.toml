name = "file_manager_archive_list"
description = "List supported archives for File Manager virtual directories and quick preview without extracting entries."
output_schema = "file-manager-archive-list-v1"
app_ids = ["file_manager"]
app_role = "data"
timeout_seconds = 120
stream_policy = "json"
max_stdout_bytes = 8388608
max_stderr_bytes = 1048576
max_decoded_bytes = 33554432
requires_sudo = false
audit_fields = ["archive_path", "archive_inner_path", "archive_max_entries"]

[[variants]]
id = "windows-powershell"
file = "powershell.ps1"
shell = "powershell"
os = ["windows"]

[[variants]]
id = "posix"
file = "posix.sh"
shell = "posix"
default = true
