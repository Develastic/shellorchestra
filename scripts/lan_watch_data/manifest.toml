name = "lan_watch_data"
description = "Discover nearby LAN hosts and read SSH banners without authenticating."
output_schema = "lan-watch-data-v1"
app_ids = ["lan_watch"]
app_role = "data"
timeout_seconds = 30
stream_policy = "json"
max_stdout_bytes = 8388608
max_stderr_bytes = 1048576
max_decoded_bytes = 33554432
requires_sudo = false

[[variants]]
id = "posix"
file = "posix.sh"
shell = "posix"
os = ["linux", "darwin", "freebsd"]
default = true

[[variants]]
id = "powershell"
file = "powershell.ps1"
shell = "powershell"
os = ["windows"]
default = false
