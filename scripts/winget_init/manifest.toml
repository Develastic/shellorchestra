name = "winget_init"
description = "Register Microsoft App Installer winget for the current Windows SSH account."
output_schema = "winget-init-v1"
timeout_seconds = 120
stream_policy = "json_action"
max_stdout_bytes = 8388608
max_stderr_bytes = 1048576
max_decoded_bytes = 33554432
requires_sudo = false

[[variants]]
id = "powershell"
file = "powershell.ps1"
shell = "powershell"
os = ["windows"]
