name = "sudo_editor_save"
description = "Validate and save one sudoers file for the virtual desktop Edit Sudo app."
output_schema = "sudo-editor-data-v1"
app_ids = ["sudo_editor"]
app_role = "action"
timeout_seconds = 20
stream_policy = "json_action"
requires_sudo = true
audit_fields = ["sudo_path", "sudo_content"]
max_stdout_bytes = 1048576
max_stderr_bytes = 131072
max_decoded_bytes = 1048576

[[variants]]
id = "posix"
file = "posix.sh"
shell = "posix"
os = ["linux", "darwin", "freebsd"]
default = true
