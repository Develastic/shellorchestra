name = "speed_test_upload"
description = "Discard binary payload streamed from the ShellOrchestra backend during Test Speed upload measurements."
output_schema = "stream-sink-v1"
app_ids = ["speedtest"]
app_role = "data"
timeout_seconds = 180
stream_policy = "binary_upload"
max_stdout_bytes = 8388608
max_stderr_bytes = 1048576
max_decoded_bytes = 33554432

[[variants]]
id = "posix"
file = "posix.sh"
shell = "posix"
os = ["linux", "darwin", "freebsd"]
default = true

[[variants]]
id = "powershell"
file = "powershell.ps1"
shell = "powershell"
os = ["windows"]
