name = "containers_action"
description = "Run explicit container lifecycle actions through Docker or Podman."
output_schema = "containers-action-v1"
app_ids = ["containers"]
app_role = "action"
timeout_seconds = 45
stream_policy = "json_action"
max_stdout_bytes = 1048576
max_stderr_bytes = 1048576
max_decoded_bytes = 1048576
requires_sudo = false
audit_fields = ["container_engine", "container_id", "container_action", "dry_run"]

[[variants]]
id = "posix"
file = "posix.sh"
shell = "posix"
os = ["linux", "darwin", "freebsd"]
default = true

[[variants]]
id = "powershell"
file = "powershell.ps1"
shell = "powershell"
os = ["windows"]
