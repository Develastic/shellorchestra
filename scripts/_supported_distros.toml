# Popular target OS distributions that ShellOrchestra intentionally supports.
#
# This catalog is a product/support contract, not a runtime fallback table.
# Runtime script selection still uses explicit detected shell, platform, package
# manager, and script manifests. If a target is not detected as expected,
# ShellOrchestra must report that clearly instead of silently pretending that a
# nearby distribution is the same.

schema_version = 1

[support_contract]
macos_policy = "macOS is treated as one supported target distribution."
windows_policy = "Windows client releases and Windows Server releases are tracked separately."
proxmox_policy = "Proxmox VE is tracked as its own supported distribution, not as plain Debian."
package_manager_policy = "Package actions use the detected official package manager only; no silent fallback to another ecosystem."

[[distros]]
id = "proxmox-ve"
display_name = "Proxmox VE"
kind = "linux"
family = "debian"
package_managers = ["apt"]
shells = ["posix", "bash"]
script_variant_family = "linux-apt"
detection_ids = ["debian"]
detection_markers = ["pveversion", "/etc/pve"]
support_tier = "primary"
notes = "Detected and presented separately from Debian because Proxmox hosts have distinct operational semantics."

