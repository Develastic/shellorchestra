name = "sudo_editor_data"
description = "List, read, validate, and save sudoers files for the virtual desktop Edit Sudo app."
output_schema = "sudo-editor-data-v1"
app_ids = ["sudo_editor"]
app_role = "data"
timeout_seconds = 20
stream_policy = "json"
max_stdout_bytes = 8388608
max_stderr_bytes = 1048576
max_decoded_bytes = 33554432
requires_sudo = true
audit_fields = ["sudo_path", "sudo_content"]

[[variants]]
id = "posix"
file = "posix.sh"
shell = "posix"
os = ["linux", "darwin", "freebsd"]
default = true
