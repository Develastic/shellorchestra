name = "backup_bucket_probe"
description = "Inspect a proposed ShellOrchestra backup bucket root path."
output_schema = "backup-bucket-probe-v1"
app_ids = ["backup_manager"]
app_role = "data"
timeout_seconds = 30
stream_policy = "json"
max_stdout_bytes = 1048576
max_stderr_bytes = 262144
max_decoded_bytes = 2097152
requires_sudo = false

[[variants]]
id = "posix"
file = "posix.sh"
shell = "posix"
os = ["linux", "darwin", "freebsd"]
default = true

[[variants]]
id = "powershell"
file = "powershell.ps1"
shell = "powershell"
os = ["windows"]
