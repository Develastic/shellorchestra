name = "disks_data"
description = "Read-only disk, partition, and mount inventory using standard target platform tools."
output_schema = "disks-data-v1"
app_ids = ["disks"]
app_role = "data"
timeout_seconds = 30
stream_policy = "json"
max_stdout_bytes = 8388608
max_stderr_bytes = 1048576
max_decoded_bytes = 33554432
requires_sudo = false

[[variants]]
id = "posix"
file = "posix.sh"
shell = "posix"
os = ["linux", "darwin", "freebsd"]
default = true

[[variants]]
id = "powershell"
file = "powershell.ps1"
shell = "powershell"
os = ["windows"]
