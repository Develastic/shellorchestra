name = "app_launch_neofetch"
description = "Launch neofetch in an interactive terminal."
output_schema = "terminal-app-v1"
app_ids = ["neofetch"]
app_role = "launch"
timeout_seconds = 10
stream_policy = "terminal"
max_stdout_bytes = 8388608
max_stderr_bytes = 1048576
max_decoded_bytes = 33554432
requires_sudo = false

[[variants]]
id = "posix"
file = "posix.sh"
shell = "posix"
os = ["linux", "darwin", "freebsd"]
default = true
