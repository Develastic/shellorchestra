name = "speed_test_download"
description = "Generate binary payload on the managed server during Test Speed download measurements."
output_schema = "binary-stream-v1"
app_ids = ["speedtest"]
app_role = "data"
timeout_seconds = 180
stream_policy = "binary_download"
max_stdout_bytes = 8388608
max_stderr_bytes = 1048576
max_decoded_bytes = 33554432

[[variants]]
id = "posix"
file = "posix.sh"
shell = "posix"
os = ["linux", "darwin", "freebsd"]
default = true

[[variants]]
id = "powershell"
file = "powershell.ps1"
shell = "powershell"
os = ["windows"]
